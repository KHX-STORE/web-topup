<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KHX STORE - Top Up Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}

body{
background:
linear-gradient(rgba(10,10,40,0.85),rgba(10,10,40,0.95)),
url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
min-height:100vh;
}

header{
padding:25px;
font-size:24px;
font-weight:700;
text-align:center;
}

.container{padding:20px}

.game-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.game-card{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:15px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.game-card:hover{
background:rgba(255,255,255,0.2);
transform:translateY(-3px);
}

.white-box{
background:white;
color:#222;
padding:20px;
border-radius:20px;
margin-top:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-bottom:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:15px;
background:linear-gradient(90deg,#6a11cb,#2575fc);
color:white;
font-weight:600;
cursor:pointer;
margin-top:10px;
}

.nominal-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:10px;
}

.nominal{
background:#f3f3f3;
padding:15px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.nominal:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(100,0,255,0.4);
}

footer{
margin-top:40px;
padding:20px;
text-align:center;
font-size:14px;
opacity:0.8;
}
</style>
</head>

<body>

<header>💎 KHX STORE - Top Up Game Murah & Cepat</header>

<div class="container">

<h3>Pilih Game</h3>
<div class="game-grid">
<div class="game-card" onclick="pilihGame('Mobile Legends')">Mobile Legends</div>
<div class="game-card" onclick="pilihGame('Free Fire')">Free Fire</div>
<div class="game-card" onclick="pilihGame('Free Fire MAX')">FF MAX</div>
</div>

<div class="white-box">

<h3>Masukkan ID</h3>
<input type="text" id="gameId" placeholder="Masukkan ID Game">
<input type="text" id="zoneId" placeholder="Zone/Server (opsional)">
<button onclick="cekId()">Cek ID</button>

<p id="nickname" style="margin-top:10px;font-weight:600;"></p>

<h3 style="margin-top:20px;">Pilih Nominal</h3>
<div class="nominal-grid">
<div class="nominal" onclick="pilihNominal('86 Diamond - Rp20.000')">86 Diamond</div>
<div class="nominal" onclick="pilihNominal('172 Diamond - Rp38.000')">172 Diamond</div>
<div class="nominal" onclick="pilihNominal('257 Diamond - Rp56.000')">257 Diamond</div>
<div class="nominal" onclick="pilihNominal('344 Diamond - Rp74.000')">344 Diamond</div>
</div>

<button onclick="kirimWA()">Beli Sekarang</button>

</div>
</div>

<footer>
📧 Email: muhsanillah@store.com<br>
© 2026 KHX STORE. All Rights Reserved.
</footer>

<script>
const STORE_NAME = "KHX STORE";
const WHATSAPP_NUMBER = "62882005188877";

let gameDipilih = "";
let nominalDipilih = "";

function pilihGame(game){
gameDipilih = game;
alert("Game dipilih: " + game);
}

function pilihNominal(nominal){
nominalDipilih = nominal;
alert("Nominal dipilih: " + nominal);
}

function cekId(){
const id = document.getElementById("gameId").value;
if(!id){
alert("Masukkan ID dulu!");
return;
}

document.getElementById("nickname").innerText = "🔎 Mengecek ID...";
setTimeout(()=>{
document.getElementById("nickname").innerText = "✅ Nickname: Player_" + id.slice(-4);
},1500);
}

function kirimWA(){
const id = document.getElementById("gameId").value;
const zone = document.getElementById("zoneId").value;

if(!gameDipilih || !nominalDipilih || !id){
alert("Lengkapi data dulu!");
return;
}

let now = new Date();
let waktu = now.toLocaleString("id-ID");

let pesan = `Halo Admin KHX STORE,%0A%0A`;
pesan += `Saya ingin melakukan Top Up dengan detail berikut:%0A%0A`;
pesan += `🧾 Invoice : INV-${Math.floor(Math.random()*100000)}%0A`;
pesan += `📅 Waktu : ${waktu}%0A%0A`;
pesan += `🎮 Game : ${gameDipilih}%0A`;
pesan += `🆔 ID : ${id}%0A`;

if(zone){
pesan += `🌐 Server : ${zone}%0A`;
}

pesan += `💎 Nominal : ${nominalDipilih}%0A%0A`;
pesan += `Mohon diproses ya Admin 🙏%0A`;
pesan += `Terima kasih.%0A%0A`;
pesan += `—%0A`;
pesan += `Pesan otomatis dari website KHX STORE`;

window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${pesan}`);
}
</script>

</body>
</html>
